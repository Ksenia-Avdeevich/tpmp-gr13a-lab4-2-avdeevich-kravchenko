name: CI — Build, Test & Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ make libsqlite3-dev lcov gcovr

      - name: Create required directories
        run: mkdir -p bin build db

      - name: Build main binary
        run: make all

      - name: Build and run tests
        run: make test

      - name: Generate coverage (gcov)
        run: make coverage

      - name: Generate HTML coverage report (lcov)
        run: |
          lcov --capture \
               --directory . \
               --output-file coverage.info \
               --ignore-errors mismatch 2>/dev/null || true
          lcov --remove coverage.info '/usr/*' '*/tests/*' \
               --output-file coverage_filtered.info 2>/dev/null || true
          genhtml coverage_filtered.info \
               --output-directory coverage_html 2>/dev/null || true

      - name: Coverage summary (gcovr)
        run: |
          gcovr --root . --exclude tests/ --print-summary \
                --fail-under-line 60 || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/
          if-no-files-found: warn
